language: 'ko-KR'

# CodeRabbit 설정
reviews:
  auto: true
  branches:
    include:
      - '*' # 모든 브랜치
  profile: 'chill'
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  locale: 'ko' # 리뷰와 요약을 한국어로 출력

# 언어별 설정
language_settings:
  typescript:
    enabled: true
    strict_mode: true
  javascript:
    enabled: true
